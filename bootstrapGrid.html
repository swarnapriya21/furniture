<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid system</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
 </head>
<body>
    <div class="container">

        <div class="row mt-3">
            <div class="col col-12 bg-primary text-center text-white mt-3 rounded shadow p-3">col-12</div>
        </div>

        <div class="row p-3 mb-3 mt-3">
            <div class="col-lg-4 bg-primary text-center text-white mt-3 rounded shadow p-3">col-4</div>
            <div class="col-lg-4 bg-primary text-center text-white mt-3 rounded shadow p-3">col-4</div>
            <div class="col-lg-4 bg-primary text-center text-white mt-3 rounded shadow p-3">col-4</div>
            
        </div>

        <div class="row mb-3">
            <div class="col-lg-3 col-md-6 bg-primary text-center text-white mt-3 rounded shadow p-3">col-3</div>
            <div class="col-lg-3 col-md-6 bg-primary text-center text-white mt-3 rounded shadow p-3">col-3</div>
            <div class="col-lg-3 col-md-6 bg-primary text-center text-white mt-3 rounded shadow p-3">col-3</div>
            <div class="col-lg-3 col-md-6 bg-primary text-center text-white mt-3 rounded shadow p-3">col-3</div>
        </div>
    </div>

    <div class="alert alert-success alert-dismissible fade show" role="alert">
  <strong>Hurry up!</strong> book the slots for webinar.
  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div class="card ms-5" style="width: 20rem;">
    <img src="" alt="image-not found" class="card-img-top"/>
    <div class="card-body">
        <h1 class="card-title">Ethnic wear</h1>
        <p class="card-text">Rs.1299</p>
        <button type="button" class="btn btn-danger">Add to cart</button>
    </div>

</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
