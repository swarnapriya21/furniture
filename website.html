<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adding css in html</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        p{
            color:purple;
        }
        h1{
            color:chartreuse;
        }
        .same-styling{
            color:#F5276C;
        }
        #btn{
            color:darkblue;
        }
        .btn{
            color:darkgreen;
        }
        *{
            color:orchid;
        }
        body{
           background-image:url("https://www.freepik.com/free-photos-vectors/aesthetic-background");
           background-size:cover;
        }
        .container{
            background-color:#531104;
        }
        .division{
            background-color:chartreuse;
        }
        #home{
            background-color: blueviolet;
            height:300px;
            width:300px;
        }
        #about{
            background-color: pink;
            height:200px;
            width:200px;
        }

    </style>
</head>
<body>
    <div class="container"></div>
     <center>
    <section id="home">
    <h1>unlimited <span style="color:blueviolet;">movies,shows</span> and more.</h1>
    <div class="division">
    <p class="same-styling">start at Rs.149/.cancel at anytime.</p>
    <p><strong>ready to watch </strong>enter email to create or restart your membership.</p>
    </div>
    <h6 class="same-styling">join now netflix</h6>
    <button id="btn" class="btn">get started</button>
    </center>
    </section>
    
    <section id="about">
    <h4>more reasons to join</h4>
    <p>download the movies</p>
    <p>watch it anywhere with Network.</p>
    <button>join now</button>
    </section>
</body>
</html>
