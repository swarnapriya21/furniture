<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            margin-top: 30px;
            background-color: darkcyan;
        }
        h1{
            color:ghostwhite ;
            font-size: 35px;
            font-weight:bold ;
            text-align: center;
            /* animation:name duration timing-function delay iteration-count direction fill-mode; */
            /* animation-timing-function: ;
            animation-name: ;
            animation-duration: ;
            animation-delay: ;
            animation-direction: ;
            animation-fill-mode: ;
            animation-iteration-count: ; */
            animation: color-change 3s ease-in-out 0.5s 3;
        }
        @keyframes color-change{
            0%{
               color: darkblue;
               font-family: Arial, Helvetica, sans-serif;
               font-size: 10px;
            }
            100%{
                color: brown;
            }
    
        }
        .box{
            height: 120px;
            width: 120px;
            margin-left: 10px;
            border-radius: 5px;
            background-color: crimson ;
            position: relative;
            animation: position-change 4s ease-in 0.4s 5;

        }
        @keyframes position-change {
            0%{
                left:0;
                top:0;

            }
            25%{
                left: 90%;
                top: 0;

            }
            50%{
                left: 90%;
                top: 70%;
                background-color:chartreuse;
            }
            75%{
                left: 0;
                top: 70%;
                background-color: cornflowerblue;
                transform: scale(0.2);
            }
            100%{
                top: 0;
                left: 0;
                border-radius: 50%;
                background-color: aqua;
                transform: scale(1.3);

            }
        }
    </style>
</head>
<body>
    <h1>CSS Animation</h1>
    <div class="box"></div>
</body>
</html>
