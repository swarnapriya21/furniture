<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loader</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: darkcyan;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .loader{
            height: 10%;
            width: 5%;
            border: 8px solid darkcyan;
            border-radius: 50%;
            border-top: 8px solid ghostwhite;
            animation: load 5s ease-out infinite;
        }
        @keyframes load{
            100%{
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="loader"></div>
</body>
</html>
